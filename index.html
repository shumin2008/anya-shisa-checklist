<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anya x Shisa 旅遊採買清單</title>
  <style>
    :root {
      --shisa-orange: #FFB74D;
      --shisa-deep-orange: #E65100;
      --shisa-cream: #FFF8F1;
      --shisa-sand: #FFE8D2;
      --shisa-brown: #6D4C41;
      --shisa-muted: #8D6E63;
      --card: rgba(255,255,255,0.92);
      --line: #F4D7BC;
      --shadow: 0 12px 30px rgba(230, 81, 0, 0.12);
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Noto Sans TC", "PingFang TC", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--shisa-brown);
      background:
        radial-gradient(circle at top right, rgba(255,183,77,0.26), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,232,210,0.95), transparent 22%),
        linear-gradient(180deg, #FFF8F1 0%, #FFFDF9 100%);
    }

    body {
      max-width: 860px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0) 14px calc(88px + env(safe-area-inset-bottom, 0));
    }

    .top-shell {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 12px 0 14px;
      backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(255,248,241,0.94), rgba(255,248,241,0.82));
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(244, 215, 188, 0.95);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,183,77,0.18), rgba(255,255,255,0.92));
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
      margin-bottom: 12px;
    }

    .hero::after {
      content: "🦁";
      position: absolute;
      right: 16px;
      top: 12px;
      font-size: 40px;
      opacity: 0.18;
      transform: rotate(-8deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.78);
      color: var(--shisa-deep-orange);
      border: 1px solid rgba(255,183,77,0.36);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .title {
      font-size: 28px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0.01em;
      margin: 0 0 6px;
      color: var(--shisa-deep-orange);
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.6;
      color: var(--shisa-muted);
      margin: 0;
      max-width: 92%;
    }

    .search-wrap,
    .map-row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-wrap,
    .map-row { grid-template-columns: 1fr auto; }

    .search {
      width: 100%;
      border: 1.5px solid var(--line);
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      color: var(--shisa-brown);
      box-shadow: 0 2px 10px rgba(230,81,0,0.04);
    }

    textarea.search { min-height: 96px; resize: vertical; font-family: inherit; }
    .search::placeholder { color: #BE9C8F; }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 0 15px;
      min-height: 48px;
      background: linear-gradient(180deg, #FFB74D, #FF9F43);
      color: white;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 159, 67, 0.25);
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 4px;
      scrollbar-width: none;
    }
    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      color: var(--shisa-brown);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .chip.active {
      background: linear-gradient(180deg, #FFB74D, #FFA85A);
      border-color: #FFB74D;
      color: white;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      margin: 6px 0 2px;
      color: var(--shisa-muted);
      font-size: 13px;
      font-weight: 700;
      gap: 10px;
      flex-wrap: wrap;
    }

    .list {
      display: grid;
      gap: 16px;
      padding-top: 10px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(244, 215, 188, 0.95);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 42%);
    }

    .photo-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #FFE8D2, #FFF3E6);
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 30px 14px 12px;
      background: linear-gradient(180deg, transparent, rgba(54, 34, 25, 0.56));
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .badge, .done-mark {
      position: absolute;
      top: 12px;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(8px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .badge {
      left: 12px;
      background: rgba(255, 248, 241, 0.92);
      color: var(--shisa-deep-orange);
      border: 1px solid rgba(255,183,77,0.35);
    }

    .done-mark {
      right: 12px;
      background: rgba(34, 197, 94, 0.95);
      color: #fff;
      display: none;
    }

    .card.done .done-mark { display: block; }
    .card.done .photo { filter: saturate(0.82) brightness(0.95); }
    .card.done { opacity: 0.82; }

    .content { padding: 15px 15px 14px; }

    .name-row {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .name {
      margin: 0 0 6px;
      font-size: 21px;
      line-height: 1.25;
      font-weight: 900;
      color: var(--shisa-brown);
    }

    .store {
      font-size: 13px;
      font-weight: 800;
      color: var(--shisa-muted);
      margin-bottom: 2px;
    }

    .price {
      flex: 0 0 auto;
      white-space: nowrap;
      background: #FFF2E5;
      color: var(--shisa-deep-orange);
      border: 1px solid #FFD5B1;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 15px;
      font-weight: 900;
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 14px;
      color: #765B52;
    }

    .meta-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.5;
    }

    .meta-label {
      flex: 0 0 46px;
      color: #C18D73;
      font-weight: 900;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      background: #FFF3E6;
      color: #B86836;
      border: 1px solid #FFDABD;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .action {
      text-align: center;
      border-radius: 14px;
      padding: 12px 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.96);
      color: var(--shisa-brown);
    }

    .action.primary {
      border-color: transparent;
      background: linear-gradient(180deg, #FFB74D, #FFA043);
      color: white;
      box-shadow: 0 8px 18px rgba(255, 160, 67, 0.22);
    }

    .empty, .tips {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,0.9);
      box-shadow: var(--shadow);
    }

    .empty {
      padding: 28px 18px;
      text-align: center;
      color: var(--shisa-muted);
      font-weight: 700;
    }

    .tips {
      margin-top: 18px;
      padding: 16px 18px;
      color: var(--shisa-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .tips code {
      background: #FFF2E5;
      color: var(--shisa-deep-orange);
      padding: 2px 6px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .firebase-box {
      border: 1px dashed #F0C8A8;
      background: #FFF7F0;
      border-radius: 16px;
      padding: 12px;
      margin-top: 12px;
    }

    .small {
      font-size: 12px;
      color: var(--shisa-muted);
      line-height: 1.6;
    }

    .footer-space { height: 12px; }

    @media (min-width: 720px) {
      .list { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .search-wrap,
      .map-row,
      .actions[style*="1fr 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>
  <div class="top-shell">
    <section class="hero">
      <div class="eyebrow">🌺 Anya x Shisa 旅遊手帳風格</div>
      <h1 class="title">沖繩採買 / 必吃清單</h1>
      
    </section>

    <div class="search-wrap">
      <input id="searchInput" class="search" placeholder="搜尋品名、地點、店家、備註" />
      <button id="clearBtn" class="btn">清除</button>
    </div>

    <div class="chip-row" id="chipRow"></div>

    <div class="status">
      <div id="resultCount">0 項</div>
      <div id="doneCount">已完成 0 項</div>
      <div id="syncStatus">尚未連線</div>
    </div>
  </div>

  <div class="list" id="list"></div>

  <section class="hero" style="margin-top:12px;">
    <div class="eyebrow">📝 直接在頁面新增 / 編輯 / 刪除</div>
    <h2 style="margin:0 0 6px;font-size:22px;color:var(--shisa-deep-orange);font-weight:900;">清單管理</h2>
    <p class="subtitle" style="max-width:100%;">直接在頁面表單輸入資料，按新增即可。</p>

    <div class="editor-grid" style="display:grid;gap:10px;margin-top:14px;">
      <input id="nameInput" class="search" placeholder="品名，例如：紅芋塔" />
      <input id="storeInput" class="search" placeholder="店家，例如：御菓子御殿" />
      <input id="locationInput" class="search" placeholder="地點，例如：國際通 / 那霸機場" />
      <input id="priceInput" class="search" placeholder="價格，例如：約 ¥1,200" />
      <input id="categoryInput" class="search" placeholder="分類，例如：伴手禮 / 必吃 / 甜點" />
      <input id="imageInput" class="search" placeholder="照片網址（可留空，改用下方直接上傳）" />

      <label class="action" style="display:block;text-align:left;padding:12px 14px;">
        直接上傳圖片
        <input id="imageFileInput" type="file" accept="image/*" style="display:block;margin-top:8px;font-size:14px;" />
      </label>
      <div id="imagePreviewWrap" style="display:none;">
        <img id="imagePreview" alt="預覽圖片" style="width:100%;max-height:220px;object-fit:cover;border-radius:16px;border:1px solid var(--line);display:block;" />
      </div>

      <div class="map-row">
        <input id="mapInput" class="search" placeholder="Google 地圖連結" />
        <button id="parseMapBtn" class="btn" type="button">帶入地點</button>
      </div>

      <input id="tagsInput" class="search" placeholder="標籤，請用逗號分隔，例如：甜點, 機場可買" />
      <textarea id="notesInput" class="search" placeholder="備註"></textarea>
    </div>

    <div class="actions" style="margin-top:12px;grid-template-columns:1fr 1fr 1fr;">
      <button id="saveItemBtn" class="action primary" type="button">新增項目</button>
      <button id="cancelEditBtn" class="action" type="button">清空表單</button>
      <button id="resetDemoBtn" class="action" type="button">寫入示範資料</button>
    </div>

    <div id="editStatus" class="status" style="margin-top:10px;padding:0;justify-content:flex-start;gap:10px;">目前為新增模式</div>

    <div class="firebase-box">
      <div class="small">
        Firestore 測試規則請先設成：<code>allow read, write: if true;</code>。若你之後要正式上線，再改成登入後才能寫入。
      </div>
    </div>
  </section>

  <div class="tips">
    這版功能包含：直接上傳圖片、Google Maps 連結解析、分類篩選、完成標記。圖片目前直接存成 base64 字串；若之後圖片很多，建議改成 Firebase Storage。
  </div>

  <div class="footer-space"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      doc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp,
      getDocs,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZgWMh1_9hpDrNB3wKFOir8lvALqmlck0",
      authDomain: "anya-shisa-checklist.firebaseapp.com",
      projectId: "anya-shisa-checklist",
      storageBucket: "anya-shisa-checklist.firebasestorage.app",
      messagingSenderId: "211196079082",
      appId: "1:211196079082:web:4d72ce8f87a61530586093"
    };

    const FIRESTORE_COLLECTION = "okinawa_items";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const itemsCol = collection(db, FIRESTORE_COLLECTION);

    const demoItems = [
      {
        category: '伴手禮',
        name: '紅芋塔',
        store: '御菓子御殿',
        location: '國際通 / 那霸機場',
        price: '約 ¥1,200',
        notes: '經典款，適合回程集中買。',
        image: 'https://images.unsplash.com/photo-1519864600265-abb23847ef2c?auto=format&fit=crop&w=1200&q=80',
        mapUrl: 'https://maps.google.com/',
        tags: ['甜點', '機場可買'],
        done: false
      },
      {
        category: '必吃',
        name: '阿古豬涮涮鍋',
        store: '百年古家大家',
        location: '名護市',
        price: '約 ¥3,000–4,000/人',
        notes: '可排北部行程日，適合午餐或晚餐。',
        image: 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1200&q=80',
        mapUrl: 'https://maps.google.com/',
        tags: ['正餐', '北部'],
        lat: '',
        lng: '',
        done: false
      },
      {
        category: '甜點',
        name: 'Blue Seal 冰淇淋',
        store: 'Blue Seal',
        location: '美國村 / 國際通',
        price: '約 ¥400–600',
        notes: '路過就能吃，適合做行程中的小停點。',
        image: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=1200&q=80',
        mapUrl: 'https://maps.google.com/',
        tags: ['冰品', '沖繩限定'],
        lat: '',
        lng: '',
        done: false
      }
    ];

    let items = [];
    let activeFilter = '全部';
    let keyword = '';
    let editingId = null;
    let uploadedImageData = '';

    const listEl = document.getElementById('list');
    const chipRowEl = document.getElementById('chipRow');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const resultCount = document.getElementById('resultCount');
    const doneCount = document.getElementById('doneCount');
    const syncStatus = document.getElementById('syncStatus');

    const nameInput = document.getElementById('nameInput');
    const storeInput = document.getElementById('storeInput');
    const locationInput = document.getElementById('locationInput');
    const priceInput = document.getElementById('priceInput');
    const categoryInput = document.getElementById('categoryInput');
    const imageInput = document.getElementById('imageInput');
    const imageFileInput = document.getElementById('imageFileInput');
    const imagePreviewWrap = document.getElementById('imagePreviewWrap');
    const imagePreview = document.getElementById('imagePreview');
    const mapInput = document.getElementById('mapInput');
    const parseMapBtn = document.getElementById('parseMapBtn');
    const tagsInput = document.getElementById('tagsInput');
    const notesInput = document.getElementById('notesInput');
    const saveItemBtn = document.getElementById('saveItemBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const resetDemoBtn = document.getElementById('resetDemoBtn');
    const editStatus = document.getElementById('editStatus');

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>"']/g, s => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[s]));
    }

    function getCategories() {
      return ['全部', ...new Set(items.map(item => item.category || '未分類'))];
    }

    function updateImagePreview(src) {
      const finalSrc = (src || '').trim();
      if (!finalSrc) {
        imagePreviewWrap.style.display = 'none';
        imagePreview.removeAttribute('src');
        return;
      }
      imagePreview.src = finalSrc;
      imagePreviewWrap.style.display = 'block';
    }

    function decodeSafe(value = '') {
      try {
        return decodeURIComponent(value.replace(/\+/g, ' '));
      } catch {
        return value;
      }
    }

    function cleanPlaceText(text = '') {
      return decodeSafe(text)
        .replace(/\s*[-|｜•·].*$/, '')
        .replace(/\bGoogle Maps\b/i, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parseGoogleMapsUrl(url) {
      try {
        const u = new URL(url);
        const result = { name: '', location: '' };
        const q = u.searchParams.get('q') || u.searchParams.get('query') || '';
        

        if (q) {
          const cleanedQ = cleanPlaceText(q);
          if (cleanedQ && !/^[-+]?\d+(\.\d+)?,\s*[-+]?\d+(\.\d+)?$/.test(cleanedQ)) {
            result.location = cleanedQ;
          }
        }

        const placeMatch = u.pathname.match(/\/place\/([^/]+)/i);
        if (placeMatch && placeMatch[1]) {
          const placeText = cleanPlaceText(placeMatch[1].replace(/\+/g, ' '));
          if (placeText) {
            result.name = placeText;
            if (!result.location) result.location = placeText;
          }
        }

        const pbPlaceMatch = url.match(/!2s([^!]+)/);
        if (!result.name && pbPlaceMatch && pbPlaceMatch[1]) {
          const pbName = cleanPlaceText(pbPlaceMatch[1]);
          if (pbName) {
            result.name = pbName;
            if (!result.location) result.location = pbName;
          }
        }

        return result;
      } catch {
        return null;
      }
    }

    function matches(item) {
      const haystack = [item.name, item.store, item.location, item.notes, item.category, ...(item.tags || [])]
        .join(' ')
        .toLowerCase();
      const textOk = !keyword || haystack.includes(keyword);
      const filterOk = activeFilter === '全部' || (item.category || '未分類') === activeFilter;
      return textOk && filterOk;
    }

    function renderChips() {
      chipRowEl.innerHTML = getCategories().map(cat => `
        <button class="chip ${cat === activeFilter ? 'active' : ''}" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>
      `).join('');

      chipRowEl.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.cat;
          renderChips();
          renderList();
        });
      });
    }

    function renderList() {
      const filtered = items.filter(matches);
      const totalDone = items.filter(item => !!item.done).length;
      doneCount.textContent = `已完成 ${totalDone} 項`;
      resultCount.textContent = `${filtered.length} 項`;

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">目前沒有符合條件的項目</div>';
        return;
      }

      listEl.innerHTML = filtered.map(item => {
        const isDone = !!item.done;
        return `
          <article class="card ${isDone ? 'done' : ''}">
            <div class="photo-wrap">
              <img class="photo" src="${escapeHtml(item.image || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80')}" alt="${escapeHtml(item.name)}">
              <div class="badge">${escapeHtml(item.category || '未分類')}</div>
              <div class="done-mark">已完成</div>
              <div class="photo-overlay">📍 ${escapeHtml(item.location || '未填寫地點')}</div>
            </div>
            <div class="content">
              <div class="name-row">
                <div>
                  <div class="store">${escapeHtml(item.store || '未填寫店家')}</div>
                  <h2 class="name">${escapeHtml(item.name)}</h2>
                </div>
                <div class="price">${escapeHtml(item.price || '未填')}</div>
              </div>
              <div class="meta">
                <div class="meta-item"><div class="meta-label">地點</div><div>${escapeHtml(item.location || '—')}</div></div>
                
                <div class="meta-item"><div class="meta-label">備註</div><div>${escapeHtml(item.notes || '—')}</div></div>
              </div>
              ${(item.tags || []).length ? `<div class="tags">${item.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
              <div class="actions" style="grid-template-columns:1fr 1fr 1fr;">
                <a class="action" href="${escapeHtml(item.mapUrl || '#')}" target="_blank" rel="noopener noreferrer">地圖</a>
                <button class="action edit-item" data-id="${escapeHtml(item.id)}">編輯</button>
                <button class="action primary toggle-done" data-id="${escapeHtml(item.id)}">${isDone ? '取消完成' : '標記完成'}</button>
              </div>
              <div class="actions" style="margin-top:10px;grid-template-columns:1fr;">
                <button class="action delete-item" data-id="${escapeHtml(item.id)}" style="color:#b42318;">刪除此項</button>
              </div>
            </div>
          </article>
        `;
      }).join('');

      listEl.querySelectorAll('.toggle-done').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const target = items.find(item => item.id === id);
          if (!target) return;
          await updateDoc(doc(db, FIRESTORE_COLLECTION, id), {
            done: !target.done,
            updatedAt: serverTimestamp()
          });
        });
      });

      listEl.querySelectorAll('.edit-item').forEach(btn => {
        btn.addEventListener('click', () => startEdit(btn.dataset.id));
      });

      listEl.querySelectorAll('.delete-item').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          if (editingId === id) resetForm();
          await deleteDoc(doc(db, FIRESTORE_COLLECTION, id));
        });
      });
    }

    function resetForm() {
      editingId = null;
      uploadedImageData = '';
      nameInput.value = '';
      storeInput.value = '';
      locationInput.value = '';
      priceInput.value = '';
      categoryInput.value = '';
      imageInput.value = '';
      mapInput.value = '';
      tagsInput.value = '';
      notesInput.value = '';
      imageFileInput.value = '';
      updateImagePreview('');
      saveItemBtn.textContent = '新增項目';
      editStatus.textContent = '目前為新增模式';
    }

    function startEdit(id) {
      const item = items.find(item => item.id === id);
      if (!item) return;
      editingId = id;
      uploadedImageData = item.image || '';
      nameInput.value = item.name || '';
      storeInput.value = item.store || '';
      locationInput.value = item.location || '';
      priceInput.value = item.price || '';
      categoryInput.value = item.category || '';
      imageInput.value = item.image || '';
      mapInput.value = item.mapUrl || '';
      tagsInput.value = (item.tags || []).join(', ');
      notesInput.value = item.notes || '';
      imageFileInput.value = '';
      updateImagePreview(item.image || '');
      saveItemBtn.textContent = '儲存修改';
      editStatus.textContent = `目前編輯中：${item.name}`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function buildItemFromForm() {
      const imageValue = (imageInput.value || '').trim() || uploadedImageData;
      return {
        name: nameInput.value.trim() || '未命名項目',
        store: storeInput.value.trim(),
        location: locationInput.value.trim(),
        price: priceInput.value.trim(),
        category: categoryInput.value.trim() || '未分類',
        image: imageValue,
        mapUrl: mapInput.value.trim(),
        notes: notesInput.value.trim(),
        tags: tagsInput.value.split(',').map(s => s.trim()).filter(Boolean),
        done: false,
        updatedAt: serverTimestamp()
      };
    }

    parseMapBtn.addEventListener('click', () => {
      const url = mapInput.value.trim();
      if (!url) {
        editStatus.textContent = '請先貼上 Google 地圖連結';
        return;
      }

      const parsed = parseGoogleMapsUrl(url);
      if (!parsed) {
        editStatus.textContent = '這個連結目前無法解析，請改貼完整的 Google Maps 分享連結';
        return;
      }

      if (parsed.name && !storeInput.value.trim()) storeInput.value = parsed.name;
      if (parsed.location && !locationInput.value.trim()) locationInput.value = parsed.location;
      const summary = [parsed.name || parsed.location || '已帶入地點'].filter(Boolean).join(' ');
      editStatus.textContent = `已從地圖連結帶入：${summary}`;
    });

    imageInput.addEventListener('input', () => {
      const value = imageInput.value.trim();
      if (value) {
        uploadedImageData = value;
        updateImagePreview(value);
      } else if (!imageFileInput.value) {
        uploadedImageData = '';
        updateImagePreview('');
      }
    });

    imageFileInput.addEventListener('change', event => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      const img = new Image();
      const reader = new FileReader();

      reader.onload = e => {
        img.onload = () => {
          const maxWidth = 1200;
          const scale = Math.min(1, maxWidth / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const compressed = canvas.toDataURL('image/jpeg', 0.8);
          uploadedImageData = compressed;
          imageInput.value = '';
          updateImagePreview(compressed);
          editStatus.textContent = `已上傳並壓縮圖片：${file.name}`;
        };
        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    });

    saveItemBtn.addEventListener('click', async () => {
      const newItem = buildItemFromForm();

      if (editingId) {
        const current = items.find(item => item.id === editingId);
        await updateDoc(doc(db, FIRESTORE_COLLECTION, editingId), {
          ...newItem,
          done: current?.done || false,
          updatedAt: serverTimestamp()
        });
      } else {
        await addDoc(itemsCol, {
          ...newItem,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }

      resetForm();
    });

    cancelEditBtn.addEventListener('click', resetForm);

    resetDemoBtn.addEventListener('click', async () => {
      const existing = await getDocs(itemsCol);
      const batch = writeBatch(db);
      existing.forEach(d => batch.delete(d.ref));
      await batch.commit();

      for (const item of demoItems) {
        await addDoc(itemsCol, {
          ...item,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }
    });

    searchInput.addEventListener('input', e => {
      keyword = e.target.value.trim().toLowerCase();
      renderList();
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      keyword = '';
      renderList();
    });

    syncStatus.textContent = '同步中…';
    const q = query(itemsCol, orderBy('updatedAt', 'desc'));
    onSnapshot(q, snapshot => {
      items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderChips();
      renderList();
      syncStatus.textContent = `已同步 ${new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}`;
    }, error => {
      console.error(error);
      syncStatus.textContent = '同步失敗，請檢查 Firebase 設定或 Firestore 規則';
    });

    resetForm();
  </script>
</body>
</html>
